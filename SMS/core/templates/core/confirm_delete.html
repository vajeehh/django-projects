{% extends 'core/base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h1 style="color: var(--danger);">{{ title }}</h1>
    
    <div style="margin: 30px 0;">
        <p style="font-size: 1.1rem;">Are you sure you want to delete this record?</p>
        <div style="margin-top: 15px; font-weight: 500; font-size: 1.25rem;">
            {{ object }}
        </div>
        <p style="color: var(--text-muted); margin-top: 15px; font-size: 0.95rem;">
            This action cannot be undone.
        </p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-actions" style="justify-content: center;">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
